<!doctype html>
<html lang="{{ (ui_locale or 'en') | replace('_', '-') }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "JLPT Mock Generator" }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-sky-100/90 via-sky-50 to-white text-slate-800">
    <main class="mx-auto max-w-3xl px-4 py-10">
      <header class="flex items-center gap-3">
        <img
          src="{{ url_for('static', filename='favicon.png') }}"
          alt="JLPT Mock Generator icon"
          class="h-16 w-16"
        />
        <div>
          <div class="text-2xl font-semibold text-sky-900 tracking-tight">
            {{ t(ui_locale or "en", "app_title") if t else "JLPT Mock Generator" }}
          </div>
          <div class="text-sm text-slate-600 leading-relaxed">
            {{ t(ui_locale or "en", "app_tagline") if t else "" }}
          </div>
        </div>
      </header>

      <section class="mt-6">
        {% if error %}
          <div class="mb-4 rounded-xl border-2 border-rose-200 bg-rose-50 p-4 text-rose-700">
            {{ error }}
          </div>
        {% endif %}
        {% block content %}{% endblock %}
      </section>

      <footer class="mt-10 text-center text-xs text-slate-500">
        © 2026 Eri Dojo. All rights reserved.
      </footer>
    </main>
  </body>
</html>
