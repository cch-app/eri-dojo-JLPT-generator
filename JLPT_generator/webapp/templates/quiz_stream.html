{% extends "_layout.html" %}
{% set title = "JLPT Mock Generator" %}

{% block content %}
  <div id="quiz-stream-app" class="space-y-4">
    <div
      id="loading-overlay"
      class="fixed inset-0 z-40 flex items-start justify-center bg-white/80 pt-24 backdrop-blur-sm"
    >
      <div class="mx-4 w-full max-w-md rounded-xl border-2 border-sky-200 bg-white p-6 shadow-md shadow-sky-200/45">
        <div class="h-4 w-40 rounded bg-sky-100 animate-pulse"></div>
        <div class="mt-4 space-y-2">
          <div class="h-3 w-full rounded bg-sky-100 animate-pulse"></div>
          <div class="h-3 w-11/12 rounded bg-sky-100 animate-pulse"></div>
          <div class="h-3 w-10/12 rounded bg-sky-100 animate-pulse"></div>
        </div>
        <div id="generation-status-text" class="mt-4 text-sm text-slate-500">
          {{ t(ui_locale, "generating_questions") }}
        </div>
      </div>
    </div>

    <div id="quiz-mount"></div>

    <form method="get" action="{{ url_for_locale('web.setup_page') }}" class="pt-2">
      <button
        type="submit"
        class="w-full rounded-xl border-2 border-sky-300 bg-white p-3 font-medium text-slate-800 hover:bg-sky-50 hover:border-sky-500"
      >
        {{ t(ui_locale, "back_setup") }}
      </button>
    </form>
  </div>

  <script>
    (function () {
      const launchToken = {{ launch_token | tojson }};
      const streamUrl = {{ stream_questions_url | tojson }};
      const mergeUrl = {{ quiz_stream_merge_url | tojson }};
      const finalizeUrl = {{ quiz_stream_finalize_url | tojson }};
      const overlay = document.getElementById("loading-overlay");
      const mount = document.getElementById("quiz-mount");
      const app = document.getElementById("quiz-stream-app");

      let sessionToken = null;
      let mergeChain = Promise.resolve();
      let displayedIndex = null;
      let formNavigationPending = false;
      let streamHadTerminalError = false;

      function syncDisplayedIndexFromDom() {
        const root = mount.querySelector("#quiz-mount-root");
        if (!root) {
          return;
        }
        const raw = root.getAttribute("data-current-index");
        if (raw === null) {
          return;
        }
        const n = parseInt(String(raw), 10);
        if (!Number.isNaN(n)) {
          displayedIndex = n;
        }
      }

      function patchChromeFromHtml(html) {
        const doc = new DOMParser().parseFromString(String(html).trim(), "text/html");
        const newRoot = doc.querySelector("#quiz-mount-root");
        const liveRoot = mount.querySelector("#quiz-mount-root");
        if (!newRoot || !liveRoot) {
          return;
        }
        for (let i = 0; i < newRoot.attributes.length; i++) {
          const attr = newRoot.attributes[i];
          if (attr.name.indexOf("data-") === 0) {
            liveRoot.setAttribute(attr.name, attr.value);
          }
        }
        const newCounter = doc.querySelector("#quiz-question-counter");
        const liveCounter = liveRoot.querySelector("#quiz-question-counter");
        if (newCounter && liveCounter) {
          liveCounter.replaceWith(doc.importNode(newCounter, true));
        }
        const newNav = doc.querySelector("#quiz-secondary-nav");
        const liveNav = liveRoot.querySelector("#quiz-secondary-nav");
        if (newNav && liveNav) {
          liveNav.replaceWith(doc.importNode(newNav, true));
        }
      }

      function mountHtml(html) {
        mount.innerHTML = html;
        syncDisplayedIndexFromDom();
      }

      async function postJson(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
            "X-Quiz-Stream": "1",
          },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(function () {
          return { ok: false, error: "Invalid response" };
        });
        return data;
      }

      function renderStreamError(message, withRetry) {
        streamHadTerminalError = true;
        overlay.classList.add("hidden");
        const retryHtml = withRetry
          ? '<button type="button" data-stream-retry="1" class="mt-4 w-full rounded-xl bg-sky-600 p-3 font-semibold text-white shadow-md shadow-sky-400/45 hover:bg-sky-500 active:bg-sky-700">Retry generation</button>'
          : "";
        mount.innerHTML =
          '<div class="rounded-xl border-2 border-rose-200 bg-rose-50 p-4 text-rose-700">' +
          String(message || "Failed to generate questions.") +
          "</div>" +
          retryHtml;
      }

      function enqueueMerge(fn) {
        mergeChain = mergeChain.then(fn).catch(function (e) {
          console.error(e);
        });
      }

      async function mergeQuestion(index, question) {
        const payload =
          sessionToken == null
            ? { launch_token: launchToken, index: index, question: question }
            : { token: sessionToken, index: index, question: question };
        const data = await postJson(mergeUrl, payload);
        if (!data.ok) {
          throw new Error(data.error || "Failed to merge streamed question.");
        }
        sessionToken = data.token;
        if (data.duplicate) {
          return;
        }
        const hasMountedQuiz = !!mount.querySelector("#quiz-action-form");
        const incomingIndex = index;
        const patchOnly =
          !formNavigationPending &&
          hasMountedQuiz &&
          displayedIndex !== null &&
          incomingIndex > displayedIndex;

        if (formNavigationPending) {
          const tokenInput = mount.querySelector('input[name="token"]');
          if (tokenInput) {
            tokenInput.value = sessionToken;
          }
        } else if (patchOnly) {
          const tokenInput = mount.querySelector('input[name="token"]');
          if (tokenInput) {
            tokenInput.value = sessionToken;
          }
          patchChromeFromHtml(data.html);
        } else {
          mountHtml(data.html);
          overlay.classList.add("hidden");
        }
      }

      async function finalizeStream() {
        if (!sessionToken) return;
        const data = await postJson(finalizeUrl, { token: sessionToken });
        if (!data.ok) {
          throw new Error(data.error || "Failed to finalize generated questions.");
        }
        sessionToken = data.token;
        const hasMountedQuiz = !!mount.querySelector("#quiz-action-form");
        if (hasMountedQuiz) {
          const tokenInput = mount.querySelector('input[name="token"]');
          if (tokenInput) {
            tokenInput.value = sessionToken;
          }
          patchChromeFromHtml(data.html);
        } else {
          mountHtml(data.html);
        }
        overlay.classList.add("hidden");
      }

      const src = new EventSource(streamUrl + "?token=" + encodeURIComponent(launchToken));

      src.onmessage = function (ev) {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === "question") {
            enqueueMerge(function () {
              return mergeQuestion(msg.index, msg.question).catch(function (err) {
                renderStreamError(err instanceof Error ? err.message : "Failed to process streamed question.", true);
              });
            });
          } else if (msg.type === "done") {
            src.close();
            enqueueMerge(function () {
              return finalizeStream().catch(function (err) {
                renderStreamError(err instanceof Error ? err.message : "Failed to finalize generated questions.", true);
              });
            });
          } else if (msg.type === "error") {
            src.close();
            renderStreamError(msg.message || "Question generation failed.", true);
          }
        } catch (e) {
          // ignore
        }
      };

      src.onerror = function () {
        try {
          src.close();
        } catch (e) {}
        if (!streamHadTerminalError && !sessionToken) {
          renderStreamError("Connection lost while generating questions. Please retry.", true);
        }
      };

      app.addEventListener("click", function (ev) {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        const ttsBtn = target.closest('[data-listening-tts="1"]');
        if (ttsBtn instanceof HTMLElement) {
          const raw = String(ttsBtn.getAttribute("data-tts-text") || "").trim();
          if (!raw || !("speechSynthesis" in window)) {
            return;
          }
          try {
            const SPEAKER_LINE_RE = /^\s*([^\s：:]{1,8})\s*[：:]\s*(.*)\s*$/;
            function parseTurns(text) {
              const lines = String(text || "")
                .split(/\r?\n/)
                .map((s) => String(s).trim())
                .filter((s) => s);
              const turns = [];
              for (const ln of lines) {
                const m = ln.match(SPEAKER_LINE_RE);
                if (m) {
                  const label = String(m[1] || "").trim();
                  const body = String(m[2] || "").trim();
                  if (label === "問題" || label === "質問") {
                    turns.push({ speaker: null, text: (label + "。" + body).replace(/。+$/, "。") });
                  } else {
                    turns.push({ speaker: label || null, text: body });
                  }
                } else {
                  turns.push({ speaker: null, text: ln });
                }
              }
              return turns.filter((t) => t.text && String(t.text).trim());
            }

            function pickVoices() {
              const vs = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
              const ja = (vs || []).filter((v) => String(v.lang || "").toLowerCase().startsWith("ja"));
              const uniq = [];
              const seen = new Set();
              for (const v of ja) {
                const k = String(v.name || "") + "|" + String(v.lang || "");
                if (!seen.has(k)) {
                  seen.add(k);
                  uniq.push(v);
                }
              }
              return uniq;
            }

            const turns = parseTurns(raw);
            // Keep playback tied to user click and avoid overlapping speech.
            window.speechSynthesis.cancel();

            const voices = pickVoices();
            const speakerToVoice = new Map();
            let voiceCursor = 0;
            function voiceForSpeaker(label) {
              if (!label || !voices.length) return null;
              if (speakerToVoice.has(label)) return speakerToVoice.get(label);
              const v = voices[voiceCursor % voices.length] || null;
              voiceCursor += 1;
              speakerToVoice.set(label, v);
              return v;
            }

            function speakTurn(i) {
              if (i >= turns.length) return;
              const t = turns[i];
              const utter = new SpeechSynthesisUtterance(String(t.text));
              utter.lang = "ja-JP";
              const v = voiceForSpeaker(t.speaker);
              if (v) utter.voice = v;
              utter.onend = function () {
                // Small gap between turns helps dialogue sound more natural.
                window.setTimeout(function () {
                  speakTurn(i + 1);
                }, 200);
              };
              window.speechSynthesis.speak(utter);
            }

            // Some browsers populate voices asynchronously.
            if (voices.length === 0 && "onvoiceschanged" in window.speechSynthesis) {
              const handler = function () {
                try {
                  window.speechSynthesis.onvoiceschanged = null;
                } catch (e) {}
                speakTurn(0);
              };
              window.speechSynthesis.onvoiceschanged = handler;
            } else {
              speakTurn(0);
            }
          } catch (e) {
            console.error("Speech playback failed", e);
          }
          return;
        }
        const retryBtn = target.closest('[data-stream-retry="1"]');
        if (!retryBtn) return;
        window.location.reload();
      });

      app.addEventListener("submit", async function (ev) {
        const form = ev.target;
        if (!(form instanceof HTMLFormElement)) return;
        if (!form.closest("#quiz-mount")) return;
        ev.preventDefault();
        if (!sessionToken) return;

        formNavigationPending = true;
        const submitter = ev.submitter;
        let targetUrl = form.getAttribute("action") || "";
        const fa = submitter && submitter.getAttribute("formaction");
        if (fa) {
          targetUrl = fa;
        }

        const fd = new FormData(form);
        const token = String(fd.get("token") || sessionToken);
        const selectedRaw = fd.get("selected_index");
        const u = new URL(targetUrl, window.location.origin);
        const isNext = u.pathname.endsWith("/next");

        let body;
        if (isNext) {
          body = { token: token };
        } else {
          body = {
            token: token,
            selected_index:
              selectedRaw === null || selectedRaw === ""
                ? null
                : Number(selectedRaw),
          };
        }

        try {
          const data = await postJson(targetUrl, body);
          if (data.action === "post_finish") {
            const f = document.createElement("form");
            f.method = "POST";
            f.action = data.finish_url;
            const inp = document.createElement("input");
            inp.type = "hidden";
            inp.name = "token";
            inp.value = data.token;
            f.appendChild(inp);
            document.body.appendChild(f);
            f.submit();
            return;
          }
          if (data.html) {
            sessionToken = data.token || sessionToken;
            mountHtml(data.html);
          }
        } finally {
          formNavigationPending = false;
        }
      });
    })();
  </script>
{% endblock %}
