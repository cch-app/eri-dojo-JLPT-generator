services:
  app:
    build: .
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-5.1}
      OLLAMA_LISTENING_AUDIO_MODEL: ${OLLAMA_LISTENING_AUDIO_MODEL:-}
      OLLAMA_LISTENING_AUDIO_MIME_TYPE: ${OLLAMA_LISTENING_AUDIO_MIME_TYPE:-audio/wav}
      SECRET_KEY: ${SECRET_KEY:-}
    ports:
      - "8000:8000"
